<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>TetraDrop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a1f">

<style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        background: linear-gradient(135deg, #0a0a1f 0%, #1a0033 100%);
        color: #00ffff;
        font-family: 'Press Start 2P', system-ui;
        overflow: hidden;
        touch-action: none;
    }
    .game-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100%;
        padding: 10px;
        position: relative;
    }
    header {
        width: 100%;
        max-width: 380px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
    }
    h1 {
        font-size: 26px;
        margin: 0;
        text-shadow: 0 0 20px #00ffff, 0 0 40px #ff00ff;
        letter-spacing: 3px;
    }
    .social-links a {
        color: #ff00ff;
        font-size: 20px;
        margin-left: 12px;
        text-decoration: none;
    }
    canvas {
        border: 6px solid #00ffff;
        box-shadow: 0 0 40px #00ffff, 0 0 60px rgba(255,0,255,0.4);
        border-radius: 12px;
        background: #05050f;
        image-rendering: pixelated;
    }
    .stats {
        display: flex;
        gap: 25px;
        font-size: 15px;
        margin: 12px 0;
        text-shadow: 0 0 10px #ff00ff;
    }
    .controls-hint {
        font-size: 12px;
        opacity: 0.7;
        margin: 8px 0;
    }

    /* Touch controls */
    .touch-controls {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 12px;
        width: 100%;
        max-width: 380px;
        margin-top: 10px;
    }
    button {
        background: rgba(0, 255, 255, 0.12);
        color: #00ffff;
        border: 3px solid #00ffff;
        font-family: 'Press Start 2P';
        font-size: 18px;
        padding: 16px;
        border-radius: 12px;
        box-shadow: 0 0 15px rgba(0,255,255,0.6);
    }
    button:active {
        background: #00ffff;
        color: #000;
        transform: scale(0.95);
    }
    .rotate-btn { grid-column: 3; grid-row: 1 / span 2; font-size: 28px; }

    .overlay {
        position: absolute;
        inset: 0;
        background: rgba(10,10,31,0.96);
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 100;
        color: #ff00ff;
        text-align: center;
    }
    .overlay button {
        margin-top: 30px;
        padding: 16px 50px;
        font-size: 18px;
    }
</style>
</head>
<body>
<div class="game-container">
    <header>
        <h1>TETRADROP</h1>
        <div class="social-links">
            <!-- Вставь свои ссылки сюда -->
            <a href="https://t.me/твой_канал" target="_blank">TG</a>
            <a href="https://vk.com/твой_профиль" target="_blank">VK</a>
            <a href="https://youtube.com/@твой_канал" target="_blank">YT</a>
        </div>
    </header>

    <canvas id="game" width="320" height="640"></canvas>

    <div class="stats">
        <div>SCORE <span id="score">0</span></div>
        <div>LEVEL <span id="level">1</span></div>
        <div>LINES <span id="lines">0</span></div>
    </div>

    <div class="controls-hint">
        ПК: ← → ↓ ↑/X (поворот) • Пробел (сброс)<br>
        Телефон: тяни пальцем влево/вправо/вниз
    </div>

    <!-- Touch buttons -->
    <div class="touch-controls">
        <button id="left">←</button>
        <button id="down">↓</button>
        <button id="right">→</button>
        <button id="rotate" class="rotate-btn">⟳</button>
        <button id="harddrop" style="grid-column: 1 / span 2;">HARD DROP</button>
    </div>
</div>

<!-- Overlays -->
<div id="pauseOverlay" class="overlay">
    <h2>PAUSED</h2>
    <button onclick="togglePause()">ПРОДОЛЖИТЬ</button>
</div>

<div id="gameOverOverlay" class="overlay">
    <h2>GAME OVER</h2>
    <p style="font-size:20px;margin:20px 0">СЧЁТ: <span id="finalScore">0</span></p>
    <button onclick="restartGame()">ИГРАТЬ СНОВА</button>
</div>

<script>
// ==================== TETRADROP v2.0 ====================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');
const linesEl = document.getElementById('lines');

const BLOCK_SIZE = 32;
const COLS = 10;
const ROWS = 20;

let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
let score = 0, linesCleared = 0, level = 1;
let dropInterval = 800;
let lastDrop = Date.now();
let gameOverFlag = false;
let paused = false;

const tetrominoes = [
    { shape: [[1,1,1,1]], color: '#00ffff' },
    { shape: [[1,1],[1,1]], color: '#ffff00' },
    { shape: [[0,1,0],[1,1,1]], color: '#ff00ff' },
    { shape: [[1,0,0],[1,1,1]], color: '#00ff44' },
    { shape: [[0,0,1],[1,1,1]], color: '#ff8800' },
    { shape: [[0,1,1],[1,1,0]], color: '#00ffff' },
    { shape: [[1,1,0],[0,1,1]], color: '#ff0088' }
];

let currentPiece, currentX, currentY, currentRotation = 0;

// Touch variables
let touchStartX = 0, touchStartY = 0, lastTouchX = 0, isDragging = false;

function newPiece() {
    const type = Math.floor(Math.random() * tetrominoes.length);
    currentPiece = tetrominoes[type];
    currentRotation = 0;
    currentX = Math.floor(COLS / 2) - Math.floor(currentPiece.shape[0].length / 2);
    currentY = 0;
    if (collision()) endGame();
}

function rotate(piece) {
    return piece[0].map((_, i) => piece.map(row => row[i]).reverse());
}

function getShape() {
    let shape = currentPiece.shape;
    for (let i = 0; i < currentRotation; i++) shape = rotate(shape);
    return shape;
}

function collision() {
    const shape = getShape();
    for (let y = 0; y < shape.length; y++) {
        for (let x = 0; x < shape[y].length; x++) {
            if (!shape[y][x]) continue;
            const bx = currentX + x;
            const by = currentY + y;
            if (bx < 0 || bx >= COLS || by >= ROWS) return true;
            if (by >= 0 && board[by][bx]) return true;
        }
    }
    return false;
}

function merge() {
    const shape = getShape();
    for (let y = 0; y < shape.length; y++) {
        for (let x = 0; x < shape[y].length; x++) {
            if (shape[y][x] && currentY + y >= 0) {
                board[currentY + y][currentX + x] = currentPiece.color;
            }
        }
    }
}

function clearLines() {
    let lines = 0;
    for (let y = ROWS - 1; y >= 0; y--) {
        if (board[y].every(c => c !== 0)) {
            board.splice(y, 1);
            board.unshift(Array(COLS).fill(0));
            lines++;
            y++;
        }
    }
    if (lines > 0) {
        const points = [0, 100, 300, 500, 800];
        score += points[lines] * level;
        linesCleared += lines;
        level = Math.floor(linesCleared / 10) + 1;
        dropInterval = Math.max(70, 820 - level * 65);

        scoreEl.textContent = score;
        levelEl.textContent = level;
        linesEl.textContent = linesCleared;
    }
}

function drop() {
    currentY++;
    if (collision()) {
        currentY--;
        merge();
        clearLines();
        newPiece();
    }
    lastDrop = Date.now();
}

function hardDrop() {
    while (!collision()) { currentY++; score += 2; }
    currentY--;
    score += 2;
    merge();
    clearLines();
    newPiece();
    scoreEl.textContent = score;
}

function move(dir) {
    currentX += dir;
    if (collision()) currentX -= dir;
}

function rotatePiece() {
    const prev = currentRotation;
    currentRotation = (currentRotation + 1) % 4;
    if (collision()) currentRotation = prev;
}

// ==================== УЛУЧШЕННОЕ ПЕРЕТАСКИВАНИЕ ПАЛЬЦЕМ ====================
canvas.addEventListener('touchstart', e => {
    if (gameOverFlag || paused) return;
    const t = e.touches[0];
    touchStartX = lastTouchX = t.clientX;
    touchStartY = t.clientY;
    isDragging = true;
});

canvas.addEventListener('touchmove', e => {
    if (!isDragging || !currentPiece) return;
    e.preventDefault();
    const t = e.touches[0];

    const deltaX = Math.floor((t.clientX - lastTouchX) / 28); // чувствительность
    const deltaY = Math.floor((t.clientY - touchStartY) / 35);

    if (deltaX !== 0) {
        move(Math.sign(deltaX));
        lastTouchX = t.clientX;
    }
    if (deltaY > 0) {
        drop();
        score += 1;
        scoreEl.textContent = score;
        touchStartY = t.clientY; // продолжаем отсчёт
    }
});

canvas.addEventListener('touchend', () => { isDragging = false; });

// ==================== РЕНДЕР ====================
function draw() {
    ctx.fillStyle = '#05050f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Сетка
    ctx.strokeStyle = 'rgba(0,255,255,0.1)';
    for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x*BLOCK_SIZE, 0); ctx.lineTo(x*BLOCK_SIZE, canvas.height); ctx.stroke();
    }

    // Блоки на поле
    for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
            if (board[y][x]) {
                ctx.fillStyle = board[y][x];
                ctx.fillRect(x*BLOCK_SIZE, y*BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                ctx.fillStyle = 'rgba(255,255,255,0.35)';
                ctx.fillRect(x*BLOCK_SIZE + 4, y*BLOCK_SIZE + 4, 10, 10);
            }
        }
    }

    // Текущая фигура
    if (currentPiece) {
        const shape = getShape();
        ctx.shadowColor = currentPiece.color;
        ctx.shadowBlur = 25;
        ctx.fillStyle = currentPiece.color;
        for (let y = 0; y < shape.length; y++) {
            for (let x = 0; x < shape[y].length; x++) {
                if (shape[y][x]) {
                    const px = (currentX + x) * BLOCK_SIZE;
                    const py = (currentY + y) * BLOCK_SIZE;
                    if (py >= 0) {
                        ctx.fillRect(px, py, BLOCK_SIZE, BLOCK_SIZE);
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(px + 6, py + 6, 8, 8);
                        ctx.fillStyle = currentPiece.color;
                    }
                }
            }
        }
        ctx.shadowBlur = 0;
    }
}

function endGame() {
    gameOverFlag = true;
    document.getElementById('finalScore').textContent = score;
    document.getElementById('gameOverOverlay').style.display = 'flex';
}

function togglePause() {
    paused = !paused;
    document.getElementById('pauseOverlay').style.display = paused ? 'flex' : 'none';
}

function restartGame() {
    board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
    score = linesCleared = 0; level = 1; dropInterval = 800;
    scoreEl.textContent = '0'; levelEl.textContent = '1'; linesEl.textContent = '0';
    document.getElementById('gameOverOverlay').style.display = 'none';
    gameOverFlag = false;
    newPiece();
}

// ==================== УПРАВЛЕНИЕ ====================
document.addEventListener('keydown', e => {
    if (gameOverFlag) return;
    if (e.key.toLowerCase() === 'p') { togglePause(); return; }
    if (paused) return;

    switch(e.key) {
        case 'ArrowLeft':  move(-1); break;
        case 'ArrowRight': move(1); break;
        case 'ArrowDown':  drop(); score += 1; scoreEl.textContent = score; break;
        case 'ArrowUp':
        case 'x':
        case 'X': rotatePiece(); break;
        case ' ': hardDrop(); break;
    }
});

// Кнопки для телефона
document.getElementById('left').addEventListener('touchstart', e => { e.preventDefault(); move(-1); });
document.getElementById('right').addEventListener('touchstart', e => { e.preventDefault(); move(1); });
document.getElementById('down').addEventListener('touchstart', e => { e.preventDefault(); drop(); score += 1; scoreEl.textContent = score; });
document.getElementById('rotate').addEventListener('touchstart', e => { e.preventDefault(); rotatePiece(); });
document.getElementById('harddrop').addEventListener('touchstart', e => { e.preventDefault(); hardDrop(); });

// ==================== ЦИКЛ ====================
function gameLoop() {
    if (!gameOverFlag && !paused) {
        if (Date.now() - lastDrop > dropInterval) drop();
    }
    draw();
    requestAnimationFrame(gameLoop);
}

newPiece();
gameLoop();
</script>
</body>
</html>
