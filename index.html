<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тетрис • С звуком</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: linear-gradient(135deg, #0f0c1f, #1a1433);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0ff;
    }
    .game-container {
      background: #161322;
      border-radius: 28px;
      padding: 25px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.7);
      display: flex;
      gap: 25px;
      border: 1px solid #3a2f6b;
    }
    canvas {
      border-radius: 16px;
      box-shadow: inset 0 0 25px rgba(0,0,0,0.9);
      image-rendering: pixelated;
    }
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 170px;
    }
    .panel {
      background: #201c33;
      border-radius: 18px;
      padding: 16px;
      text-align: center;
      border: 1px solid #463c7a;
    }
    button {
      background: #2a2452;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      margin: 5px 0;
      width: 100%;
    }
    button:hover { background: #3b2f7a; transform: translateY(-2px); }
    #soundBtn { background: #1e3a2f; }
    #soundBtn.muted { background: #4a2a2a; }
  </style>
</head>
<body>
<div class="game-container">
  <div>
    <canvas id="board" width="300" height="600"></canvas>
  </div>

  <div class="sidebar">
    <div class="panel">
      <div>Следующая</div>
      <canvas id="next" width="120" height="120"></canvas>
    </div>

    <div class="panel">
      <div>Удержание (C)</div>
      <canvas id="hold" width="120" height="120"></canvas>
    </div>

    <div class="panel stats">
      <div>Очки</div>
      <div id="score" class="value">0</div>
      <div>Уровень</div>
      <div id="level" class="value">1</div>
      <div>Линии</div>
      <div id="lines" class="value">0</div>
    </div>

    <div>
      <button id="startBtn">▶ Новая игра</button>
      <button id="pauseBtn">⏸ Пауза</button>
      <button id="soundBtn">🔊 Звук: Вкл</button>
    </div>
  </div>
</div>

<script>
// ==================== AUDIO ====================
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();

let soundEnabled = true;

function playSound(freq, duration, type = 'sine', volume = 0.3) {
  if (!soundEnabled) return;
  const oscillator = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  
  oscillator.type = type;
  oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.value = volume;
  
  oscillator.connect(gain);
  gain.connect(audioCtx.destination);
  
  oscillator.start();
  oscillator.stop(audioCtx.currentTime + duration);
}

function playMoveSound() {
  playSound(800, 0.02, 'square', 0.15);
}

function playRotateSound() {
  playSound(1200, 0.08, 'sine', 0.25);
}

function playDropSound() {
  playSound(400, 0.05, 'sawtooth', 0.2);
}

function playHardDropSound() {
  playSound(200, 0.15, 'sawtooth', 0.4);
  setTimeout(() => playSound(150, 0.2, 'sawtooth', 0.3), 50);
}

function playLineClear(lines) {
  const base = 600;
  for (let i = 0; i < lines; i++) {
    setTimeout(() => {
      playSound(base + i * 150, 0.15, 'triangle', 0.4);
    }, i * 60);
  }
  // Финальный аккорд
  setTimeout(() => playSound(1200, 0.4, 'sine', 0.3), lines * 60 + 100);
}

function playHoldSound() {
  playSound(900, 0.05);
  setTimeout(() => playSound(1300, 0.08), 40);
}

function playGameOverSound() {
  let f = 800;
  const interval = setInterval(() => {
    playSound(f, 0.1, 'sawtooth', 0.4);
    f *= 0.85;
    if (f < 100) clearInterval(interval);
  }, 80);
}

// ==================== ИГРА (остальной код) ====================
const COLS = 10, ROWS = 20, CELL = 30;
const COLORS = ['#111', '#00f0f0', '#f0f000', '#a000f0', '#00f000', '#f00000', '#0000f0', '#f0a000'];

const SHAPES = [null,
  [[0,0],[1,0],[2,0],[3,0]], // I
  [[0,0],[0,1],[1,0],[1,1]], // O
  [[0,0],[1,0],[2,0],[1,1]], // T
  [[0,0],[1,0],[1,1],[2,1]], // S
  [[1,0],[2,0],[0,1],[1,1]], // Z
  [[0,0],[0,1],[1,1],[2,1]], // J
  [[2,0],[0,1],[1,1],[2,1]]  // L
];

let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
let current, nextPiece, holdPiece = null, canHold = true;
let score = 0, linesCleared = 0, level = 1;
let gameActive = false, paused = false, gameOver = false;
let lastDrop = 0, dropInterval = 800;
let animationFrame;

const boardCanvas = document.getElementById('board');
const ctx = boardCanvas.getContext('2d');
const nextCanvas = document.getElementById('next');
const nextCtx = nextCanvas.getContext('2d');
const holdCanvas = document.getElementById('hold');
const holdCtx = holdCanvas.getContext('2d');

const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');
const linesEl = document.getElementById('lines');
const soundBtn = document.getElementById('soundBtn');

// ==================== ОТРИСОВКА (без изменений) ====================
function drawBoard() { /* ... тот же код что был раньше ... */ 
  ctx.fillStyle = '#0a0814';
  ctx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (board[y][x]) {
        ctx.fillStyle = COLORS[board[y][x]];
        ctx.fillRect(x*CELL+1, y*CELL+1, CELL-2, CELL-2);
      }
    }
  }

  if (current) {
    let ghostY = current.y;
    while (isValid(current, current.x, ghostY + 1)) ghostY++;
    ctx.globalAlpha = 0.22;
    for (let [dx, dy] of current.shape) {
      ctx.fillStyle = COLORS[current.type];
      ctx.fillRect((current.x + dx)*CELL + 1, (ghostY + dy)*CELL + 1, CELL-2, CELL-2);
    }
    ctx.globalAlpha = 1;

    for (let [dx, dy] of current.shape) {
      ctx.fillStyle = COLORS[current.type];
      ctx.fillRect((current.x + dx)*CELL + 1, (current.y + dy)*CELL + 1, CELL-2, CELL-2);
    }
  }
}

function drawPreview(canvas, ctx, piece) {
  ctx.fillStyle = '#0a0814';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (!piece) return;
  const size = 22;
  const ox = (canvas.width - 4*size)/2 + 8;
  const oy = (canvas.height - 4*size)/2;
  for (let [dx, dy] of piece.shape) {
    ctx.fillStyle = COLORS[piece.type];
    ctx.fillRect(ox + dx*size, oy + dy*size, size-2, size-2);
  }
}

// ==================== ЛОГИКА ИГРЫ ====================
function randomPiece() {
  const type = Math.floor(Math.random() * 7) + 1;
  return { shape: SHAPES[type].map(p => [...p]), type, x: type===1?3:4, y:0 };
}

function isValid(piece, x=piece.x, y=piece.y) {
  for (let [dx, dy] of piece.shape) {
    const nx = x + dx, ny = y + dy;
    if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
    if (ny >= 0 && board[ny][nx] !== 0) return false;
  }
  return true;
}

function lockPiece() {
  for (let [dx, dy] of current.shape) {
    const x = current.x + dx, y = current.y + dy;
    if (y >= 0) board[y][x] = current.type;
  }
}

function clearLines() {
  let lines = 0;
  for (let r = ROWS-1; r >= 0; r--) {
    if (board[r].every(c => c !== 0)) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(0));
      lines++;
      r++;
    }
  }
  return lines;
}

function updateScore(lines) {
  const points = [0, 100, 300, 500, 800];
  score += points[lines] * level;
  linesCleared += lines;
  level = Math.floor(linesCleared / 10) + 1;
  
  scoreEl.textContent = score;
  levelEl.textContent = level;
  linesEl.textContent = linesCleared;
}

function spawnPiece() {
  current = nextPiece || randomPiece();
  nextPiece = randomPiece();
  canHold = true;
  drawPreview(nextCanvas, nextCtx, nextPiece);
  
  if (!isValid(current)) {
    gameOver = true;
    gameActive = false;
    playGameOverSound();
  }
}

function hardDrop() {
  while (isValid(current, current.x, current.y + 1)) current.y++;
  playHardDropSound();
  lockPiece();
  const lines = clearLines();
  if (lines > 0) playLineClear(lines);
  updateScore(lines);
  spawnPiece();
}

function rotate() {
  const old = current.shape;
  current.shape = old.map(([x,y]) => [y, -x]);
  const kicks = [[0,0],[1,0],[-1,0],[0,1],[0,-1]];
  for (let [kx,ky] of kicks) {
    if (isValid(current, current.x+kx, current.y+ky)) {
      current.x += kx; current.y += ky;
      playRotateSound();
      return;
    }
  }
  current.shape = old;
}

function hold() {
  if (!canHold) return;
  canHold = false;
  playHoldSound();
  
  if (!holdPiece) {
    holdPiece = { ...current, shape: SHAPES[current.type].map(p=>[...p]) };
    spawnPiece();
  } else {
    [current, holdPiece] = [holdPiece, current];
    current.x = current.type === 1 ? 3 : 4;
    current.y = 0;
    current.shape = SHAPES[current.type].map(p=>[...p]);
  }
  drawPreview(holdCanvas, holdCtx, holdPiece);
}

// ==================== ИГРОВОЙ ЦИКЛ ====================
function gameLoop(timestamp) {
  if (!gameActive || paused || gameOver) {
    requestAnimationFrame(gameLoop);
    return;
  }

  if (timestamp - lastDrop > dropInterval / Math.sqrt(level)) {
    if (!isValid(current, current.x, current.y + 1)) {
      lockPiece();
      const lines = clearLines();
      if (lines > 0) playLineClear(lines);
      updateScore(lines);
      spawnPiece();
    } else {
      current.y++;
      playDropSound();
    }
    lastDrop = timestamp;
  }

  drawBoard();
  requestAnimationFrame(gameLoop);
}

// ==================== УПРАВЛЕНИЕ ====================
document.addEventListener('keydown', e => {
  if (!gameActive || paused || gameOver) return;

  switch(e.key) {
    case 'ArrowLeft': case 'a': case 'A':
      if (isValid(current, current.x-1)) { current.x--; playMoveSound(); }
      break;
    case 'ArrowRight': case 'd': case 'D':
      if (isValid(current, current.x+1)) { current.x++; playMoveSound(); }
      break;
    case 'ArrowDown': case 's': case 'S':
      if (isValid(current, current.x, current.y+1)) { current.y++; playDropSound(); }
      break;
    case 'ArrowUp': case 'w': case 'W':
      rotate();
      break;
    case ' ':
      e.preventDefault();
      hardDrop();
      break;
    case 'c': case 'C':
      hold();
      break;
    case 'p': case 'P': case 'Escape':
      paused = !paused;
      break;
  }
  drawBoard();
});

// Кнопки
document.getElementById('startBtn').onclick = () => {
  board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
  score = linesCleared = 0; level = 1;
  holdPiece = null;
  scoreEl.textContent = '0'; levelEl.textContent = '1'; linesEl.textContent = '0';
  
  nextPiece = randomPiece();
  spawnPiece();
  drawPreview(holdCanvas, holdCtx, null);
  
  gameActive = true; gameOver = false; paused = false;
  lastDrop = performance.now();
  requestAnimationFrame(gameLoop);
};

document.getElementById('pauseBtn').onclick = () => { if(gameActive) paused = !paused; };

soundBtn.onclick = () => {
  soundEnabled = !soundEnabled;
  soundBtn.textContent = soundEnabled ? "🔊 Звук: Вкл" : "🔇 Звук: Выкл";
  soundBtn.classList.toggle('muted', !soundEnabled);
};

// Автозапуск
window.onload = () => document.getElementById('startBtn').click();
</script>
</body>
</html>
